name: bem_estar
description: Aplicativo para academia funcional
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # =========================
  # FIREBASE
  # =========================
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0

  # =========================
  # STATE MANAGEMENT
  # =========================
  provider: ^6.1.5

  # =========================
  # UI / UTIL
  # =========================
  intl: ^0.20.2
  table_calendar: ^3.2.0
  qr_flutter: ^4.1.0

  # =========================
  # NOTIFICAÇÕES LOCAIS
  # =========================
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # =========================
  # ÍCONE DO APP
  # =========================
  flutter_launcher_icons: ^0.13.1

flutter:

  uses-material-design: true

  assets:
    - assets/images/logo.png

# ==============================
# CONFIG DO ÍCONE DO APP
# ==============================
flutter_launcher_icons:
  android: true
  ios: true

  image_path: "assets/images/icon.png"